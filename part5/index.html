<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>JIM TOEIC</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topbar">
  <div class="brand">JIM TOEIC PART 5</div>

  <div class="topbar-right">
    <span id="score" class="score-header"></span>
    <a href="../index.html" class="btn-secondary back-btn">← Back</a>
  </div>
</header>

<main class="container">

<section class="controls">

  <div class="controls-group">
    <label>Folder:
      <select id="folderSelect"></select>
    </label>
  </div>

  <div class="controls-group">
    <label class="small">
      <input type="checkbox" id="shuffle" checked>
      Shuffle options
    </label>

    <label class="small">
      <input type="checkbox" id="random40">
      Random 40
    </label>

    <button class="btn-secondary redo-btn">Reset</button>
  </div>

  <div id="discoverStatus" style="margin-top:8px;color:#5f6368;font-size:0.9rem;"></div>
</section>

<div class="progress-wrap">
  <div class="progress-info">
    <span id="summary">0 / 0 answered</span>
  </div>
  <div class="progress-bar">
    <div id="progressFill" class="progress-fill"></div>
  </div>
</div>

<div id="quiz" class="quiz-area"></div>

</main>

<script src="script.js"></script>

</body>
</html>
