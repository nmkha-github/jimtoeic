<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>JIM TOEIC - READING PART 7</title>

<style>
:root {
    --accent:#1a73e8;
    --success:#10b981;
    --danger:#ef4444;
    --bg:#f8f9fa;
    --border:#dadce0;
    --text:#202124;
}

body{
    margin:0;
    font-family:system-ui,-apple-system,sans-serif;
    background:var(--bg);
    color:var(--text);
    line-height:1.5;
}

.topbar{
    background:#fff;
    padding:12px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:10px;
    position:sticky;
    top:0;
    z-index:1000;
    box-shadow:0 1px 3px rgba(0,0,0,.1);
}

.brand{
    font-weight:700;
    font-size:1.2rem;
    color:var(--accent);
    white-space:nowrap;
}

.topbar-actions{
    display:flex;
    gap:10px;
    align-items:center;
    flex-wrap:wrap;
}

.btn{
    border:1px solid var(--accent);
    background:#fff;
    color:var(--accent);
    padding:7px 14px;
    border-radius:8px;
    cursor:pointer;
    text-decoration:none;
    font-weight:600;
    display:inline-flex;
    align-items:center;
    gap:6px;
}

.btn:hover{ background:#f8faff; }

.control{
    display:flex;
    align-items:center;
    gap:8px;
    background:#fff;
    border:1px solid var(--border);
    border-radius:8px;
    padding:6px 10px;
}

.control label{
    font-size:.9rem;
    color:#5f6368;
    font-weight:600;
}

.control select{
    border:none;
    outline:none;
    background:transparent;
    font-size:.95rem;
    min-width:110px;
}

.control.checkbox-control{
    gap:10px;
}

.control.checkbox-control input{
    width:16px;
    height:16px;
    accent-color:var(--accent);
    cursor:pointer;
}

.container{
    max-width:900px;
    margin:20px auto;
    padding:0 12px;
}

.summary{
    margin-bottom:8px;
    font-weight:600;
}

.progress-bar{
    height:8px;
    background:#e8eaed;
    border-radius:4px;
    overflow:hidden;
}

.progress-fill{
    height:100%;
    width:0%;
    background:var(--accent);
    transition:width .25s ease;
}

.hint{
    margin-top:8px;
    font-size:.85rem;
    color:#5f6368;
}

.passage-group{
    background:#fff;
    padding:20px;
    margin:20px 0 30px;
    border-radius:12px;
    border:1px solid var(--border);
    box-shadow:0 2px 10px rgba(0,0,0,.05);
}

.passage-header{
    font-weight:700;
    color:var(--accent);
    margin-bottom:14px;
    padding-bottom:8px;
    border-bottom:2px solid #e8f0fe;
}

.passage-image{
    width:100%;
    display:block;
    margin-bottom:22px;
    border-radius:8px;
    border:1px solid #eee;
}

.passage-content{
    margin-bottom:22px;
    padding:14px 16px;
    border:1px solid #eee;
    border-radius:8px;
    background:#fafafa;
    line-height:1.7;
    font-size:1rem;
}

.passage-content p{
    margin:8px 0;
}

.passage-content h1,
.passage-content h2,
.passage-content h3,
.passage-content h4,
.passage-content h5,
.passage-content h6{
    margin:10px 0 8px;
    line-height:1.25;
}

.passage-content ul,
.passage-content ol{
    margin:8px 0 8px 22px;
    padding:0;
}

.passage-content table{
    width:100%;
    border-collapse:collapse;
    margin:10px 0;
}

.passage-content td,
.passage-content th{
    border:1px solid #ddd;
    padding:8px;
    vertical-align:top;
}

.card{
    margin-bottom:28px;
    padding-top:16px;
    border-top:1px dashed #eee;
}

.card:first-of-type{
    border-top:none;
    padding-top:0;
}

.q-title{
    font-weight:600;
    font-size:1.02rem;
    margin-bottom:14px;
}

.options{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.option{
    display:flex;
    align-items:center;
    gap:12px;
    padding:12px 16px;
    border:1px solid var(--border);
    border-radius:8px;
    cursor:pointer;
    transition:.2s;
    background:#fff;
}

.option:hover{
    background:#f8f9fa;
}

.option.selected{
    border-color:var(--accent);
    background:#e8f0fe;
}

.option.correct{
    background:#e6f4ea;
    border-color:var(--success);
    color:#137333;
}

.option.wrong{
    background:#fce8e6;
    border-color:var(--danger);
    color:#c5221f;
}

.label{
    width:26px;
    height:26px;
    background:#f1f3f4;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:700;
    font-size:.85rem;
    flex-shrink:0;
}

.loading{
    text-align:center;
    padding:50px;
    color:#5f6368;
}
</style>
</head>

<body>
<header class="topbar">
    <div class="brand">JIM TOEIC PART 7</div>

    <div class="topbar-actions">
        <a href="../index.html" class="btn">← Back</a>

        <div class="control">
            <label for="folderSelect">Folder</label>
            <select id="folderSelect"></select>
        </div>

        <div class="control">
            <label for="testSelect">Test</label>
            <select id="testSelect"></select>
        </div>

        <div class="control checkbox-control">
            <label for="shuffleToggle">Shuffle</label>
            <input type="checkbox" id="shuffleToggle">
        </div>

        <button class="btn" id="resetBtn">Reset</button>
    </div>
</header>

<main class="container">
    <div class="summary" id="summary">0 / 0 answered</div>
    <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
    <div class="hint" id="hint"></div>

    <div id="quiz-container" style="margin-top:20px;">
        <div class="loading">Đang tải dữ liệu bài đọc...</div>
    </div>
</main>

<script>
const el = (id) => document.getElementById(id);

const folders = ["jim", "old_test"];

const folderSelect = el("folderSelect");
const testSelect = el("testSelect");
const resetBtn = el("resetBtn");
const shuffleToggle = el("shuffleToggle");
const quizContainer = el("quiz-container");
const hint = el("hint");
const summaryEl = el("summary");
const progressFill = el("progressFill");

let groupsData = [];
let allQuestionsData = [];
let userAnswers = {};
let availableTests = [];
let currentFolder = "jim";
let currentTest = "";
let questionOrderMap = {};

const DISPLAY_KEYS = ["A", "B", "C", "D"];

function pad2(n) {
    return String(n).padStart(2, "0");
}

function qFile(folder, testNo) {
    return `${folder}/test${pad2(testNo)}.json`;
}

async function fileExists(url) {
    try {
        const res = await fetch(url, { cache: "no-store" });
        return res.ok;
    } catch {
        return false;
    }
}

function saveState() {
    localStorage.setItem("toeic_part7_folder", currentFolder);
    localStorage.setItem("toeic_part7_test", currentTest);
    localStorage.setItem("toeic_part_7_shuffle", String(shuffleToggle.checked));
}

function isShuffleEnabled() {
    return localStorage.getItem("toeic_part_7_shuffle") === "true";
}

function toInt(v) {
    const n = Number(v);
    return Number.isFinite(n) ? n : NaN;
}

function normalizeGroups(data) {
    if (!Array.isArray(data)) return [];

    return data.map(group => {
        const queries = Array.isArray(group.queries) ? group.queries : [];
        return {
            url: group.url || "",
            passage: group.passage || "",
            queries: queries
                .map(q => ({
                    ...q,
                    id: toInt(q.id),
                    answer: String(q.answer ?? ""),
                }))
                .filter(q => Number.isFinite(q.id))
                .sort((a, b) => a.id - b.id)
        };
    });
}

function initFolders() {
    folderSelect.innerHTML = "";

    folders.forEach(folder => {
        const opt = document.createElement("option");
        opt.value = folder;
        opt.textContent = folder;
        folderSelect.appendChild(opt);
    });

    const savedFolder = localStorage.getItem("toeic_part7_folder");
    if (savedFolder && folders.includes(savedFolder)) {
        folderSelect.value = savedFolder;
    } else {
        folderSelect.value = folders[0];
    }

    currentFolder = folderSelect.value;
    shuffleToggle.checked = isShuffleEnabled();
}

async function scanTests(folder) {
    const tests = [];

    for (let i = 1; i <= 200; i++) {
        const ok = await fileExists(qFile(folder, i));
        if (ok) tests.push(i);
        else break;
    }

    return tests;
}

function renderTests(list) {
    testSelect.innerHTML = "";

    if (!list.length) {
        const opt = document.createElement("option");
        opt.value = "";
        opt.textContent = "No test found";
        testSelect.appendChild(opt);
        currentTest = "";
        return;
    }

    list.forEach(i => {
        const opt = document.createElement("option");
        opt.value = String(i);
        opt.textContent = `test${pad2(i)}`;
        testSelect.appendChild(opt);
    });

    const savedTest = localStorage.getItem("toeic_part7_test");
    if (savedTest && list.includes(parseInt(savedTest, 10))) {
        testSelect.value = savedTest;
    } else {
        testSelect.value = String(list[0]);
    }

    currentTest = testSelect.value;
}

function shuffledArray(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

function buildQuestionOrderMap() {
    questionOrderMap = {};

    allQuestionsData.forEach(q => {
        const originalKeys = DISPLAY_KEYS.filter(k => q.options && Object.prototype.hasOwnProperty.call(q.options, k));
        const sourceKeys = shuffleToggle.checked ? shuffledArray(originalKeys) : originalKeys.slice();

        while (sourceKeys.length < DISPLAY_KEYS.length) {
            sourceKeys.push("");
        }

        questionOrderMap[q.id] = sourceKeys;
    });
}

async function loadSelectedTest() {
    currentFolder = folderSelect.value;
    currentTest = testSelect.value;

    if (!currentFolder || !currentTest) {
        quizContainer.innerHTML = `<div class="loading">Không có test hợp lệ.</div>`;
        summaryEl.innerText = "0 / 0 answered";
        progressFill.style.width = "0%";
        hint.textContent = "";
        saveState();
        return;
    }

    hint.textContent = `Folder: ${currentFolder} • Test: test${pad2(currentTest)} • Shuffle: ${shuffleToggle.checked ? "ON" : "OFF"}`;
    quizContainer.innerHTML = `<div class="loading">Đang tải dữ liệu bài đọc...</div>`;
    userAnswers = {};

    saveState();

    try {
        const resQ = await fetch(qFile(currentFolder, currentTest), { cache: "no-store" });
        if (!resQ.ok) throw new Error("Không tải được file JSON");

        const rawData = await resQ.json();
        groupsData = normalizeGroups(rawData);
        allQuestionsData = groupsData.flatMap(g => g.queries || []);

        buildQuestionOrderMap();
        renderQuiz();
    } catch (err) {
        console.error(err);
        quizContainer.innerHTML = `<div class="loading">Không thể tải dữ liệu test${pad2(currentTest)} trong folder "${currentFolder}".</div>`;
        summaryEl.innerText = "0 / 0 answered";
        progressFill.style.width = "0%";
    }
}

function renderPassage(group, groupIndex, passageDiv) {
    if (group.passage) {
        const passageContent = document.createElement("div");
        passageContent.className = "passage-content";
        passageContent.innerHTML = group.passage;
        passageDiv.appendChild(passageContent);
    } else if (group.url) {
        const img = document.createElement("img");
        img.className = "passage-image";
        img.src = group.url;
        img.alt = `Reading passage ${groupIndex + 1}`;
        passageDiv.appendChild(img);
    }
}

function handleSelect(questionId, selectedDisplayKey, correctDisplayKey, currentEl, parentEl) {
    if (userAnswers[questionId]) return;

    userAnswers[questionId] = selectedDisplayKey;

    const allOptions = parentEl.querySelectorAll(".option");
    allOptions.forEach(opt => {
        const label = opt.querySelector(".label")?.innerText;
        if (label === correctDisplayKey) {
            opt.classList.add("correct");
        } else if (label === selectedDisplayKey && selectedDisplayKey !== correctDisplayKey) {
            opt.classList.add("wrong");
        }
    });

    currentEl.classList.add("selected");
    updateProgress();
}

function renderQuiz() {
    const container = quizContainer;
    container.innerHTML = "";

    const totalQuestions = allQuestionsData.length;
    summaryEl.innerText = `0 / ${totalQuestions} answered`;
    progressFill.style.width = "0%";

    groupsData.forEach((group, groupIndex) => {
        const queries = Array.isArray(group.queries) ? group.queries : [];
        if (!queries.length) return;

        const passageDiv = document.createElement("div");
        passageDiv.className = "passage-group";

        const header = document.createElement("div");
        header.className = "passage-header";
        header.innerText = `Passage ${groupIndex + 1}`;
        passageDiv.appendChild(header);

        renderPassage(group, groupIndex, passageDiv);

        queries.forEach(q => {
            const qCard = document.createElement("div");
            qCard.className = "card";
            qCard.innerHTML = `<div class="q-title">${q.id}. ${q.question ?? ""}</div>`;

            const optionsDiv = document.createElement("div");
            optionsDiv.className = "options";

            const sourceKeys = questionOrderMap[q.id] || DISPLAY_KEYS.slice();
            const correctSourceIndex = sourceKeys.indexOf(String(q.answer));
            const correctDisplayKey = correctSourceIndex >= 0 ? DISPLAY_KEYS[correctSourceIndex] : String(q.answer);

            DISPLAY_KEYS.forEach((displayKey, idx) => {
                const sourceKey = sourceKeys[idx] || "";
                const optBtn = document.createElement("div");
                optBtn.className = "option";
                optBtn.innerHTML = `
                    <div class="label">${displayKey}</div>
                    <div class="opt-text">${sourceKey ? (q.options?.[sourceKey] ?? "") : ""}</div>
                `;

                optBtn.onclick = () => handleSelect(String(q.id), displayKey, correctDisplayKey, optBtn, optionsDiv);
                optionsDiv.appendChild(optBtn);
            });

            qCard.appendChild(optionsDiv);
            passageDiv.appendChild(qCard);
        });

        container.appendChild(passageDiv);
    });

    updateProgress();
}

function updateProgress() {
    const answeredCount = Object.keys(userAnswers).length;
    const totalCount = allQuestionsData.length || 0;
    const percent = totalCount ? (answeredCount / totalCount) * 100 : 0;

    summaryEl.innerText = `${answeredCount} / ${totalCount} answered`;
    progressFill.style.width = `${percent}%`;
}

function resetSelections() {
    userAnswers = {};
    renderQuiz();
    window.scrollTo({ top: 0, behavior: "smooth" });
}

async function refreshTestsAndLoad() {
    currentFolder = folderSelect.value;
    availableTests = await scanTests(currentFolder);
    renderTests(availableTests);
    await loadSelectedTest();
}

folderSelect.addEventListener("change", refreshTestsAndLoad);
testSelect.addEventListener("change", loadSelectedTest);

shuffleToggle.addEventListener("change", async () => {
    saveState();
    if (allQuestionsData.length) {
        userAnswers = {};
        buildQuestionOrderMap();
        renderQuiz();
        hint.textContent = `Folder: ${currentFolder} • Test: test${pad2(currentTest)} • Shuffle: ${shuffleToggle.checked ? "ON" : "OFF"}`;
    }
});

resetBtn.addEventListener("click", resetSelections);

window.onload = async () => {
    initFolders();
    availableTests = await scanTests(folderSelect.value);
    renderTests(availableTests);
    await loadSelectedTest();
};
</script>
</body>
</html>
